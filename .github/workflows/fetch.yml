name: Fetch

on:
  workflow_dispatch:
  schedule:
    # 表达式生成 https://crontab.guru/
    - cron: '30 0-15/2 * * *'
  push:
    paths:
      - 'sources.list'
      - 'config.yml'
      - '.github/workflows/**'
      - '**.py'
      - 'snippets/_*'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: 迁出代码
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}      
    - name: 安装 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'
    - name: 安装依赖
      run: pip install -r requirements.txt
    - name: 执行任务
      run: python ./fetch.py
      
    - name: 提交更改
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        echo "=== 强制使用本地最新数据 ==="
        
        # 直接强制覆盖冲突文件（最关键）
        git add list.yml list_result.csv snippets/adblock.yml
        
        # 临时提交新数据
        git commit -m "temp: new data" || true
        
        # 强制重置 + 重新应用新数据
        git fetch origin
        git reset --hard origin/master
        
        git checkout --ours list.yml snippets/adblock.yml 2>/dev/null || true
        git add list.yml list_result.csv snippets/adblock.yml
        
        # 最终提交
        if git diff --staged --quiet; then
          echo "没有改动，跳过提交"
        else
          git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 更新节点"
          echo "✅ 提交成功"
        fi
        
        # 7. 最终提交
        if git diff --staged --quiet; then
          echo "没有实际改动，跳过提交"
        else
          git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 更新节点"
          echo "提交成功"
        fi
        
    - name: 推送更改
      uses: ad-m/github-push-action@master
      with:
        branch: master

    - name: 计算要清除缓存的文件
      id: purge_urls
      run: |
        sleep 3
        baseUrl="https://cdn.jsdelivr.net/gh/${{ github.repository }}@master"
        urls=""
        for f in `find snippets -name "*.yml" -type f`; do
          urls+="${baseUrl}/${f},"
        done
        for f in `find . -name "list*" -type f -maxdepth 1`; do
          urls+="${baseUrl}/${f},"
        done
        echo "urls=${urls%,*}" >> $GITHUB_OUTPUT
    - name: 清除 JsDelivr CDN 缓存
      uses: egad13/purge-jsdelivr-cache@v1
      with:
        url: ${{ steps.purge_urls.outputs.urls }}
