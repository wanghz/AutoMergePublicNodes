name: Fetch

on:
  workflow_dispatch:
  schedule:
    # 表达式生成 https://crontab.guru/
    - cron: '30 0-15/2 * * *'
  push:
    paths:
      - 'sources.list'
      - 'config.yml'
      - '.github/workflows/**'
      - '**.py'
      - 'snippets/_*'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: 迁出代码
      uses: actions/checkout@v3
    - name: 安装 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'
    - name: 安装依赖
      run: pip install -r requirements.txt
    - name: 执行任务
      run: python ./fetch.py
      
    - name: 提交更改
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        git add list.yml list_result.csv snippets/adblock.yml
        
        # 如果有改动就先提交
        git commit -m "temp: new data" || true
        
        # 强制同步远程（最关键的一步）
        git fetch origin
        git reset --hard origin/master
        
        # 重新应用我们刚抓取的新内容
        git add list.yml list_result.csv snippets/adblock.yml
        
        if git diff --staged --quiet; then
          echo "No changes detected"
        else
          git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 更新节点"
        fi
        
    - name: 推送更改
      uses: ad-m/github-push-action@master
      with:
        branch: master

    - name: 计算要清除缓存的文件
      id: purge_urls
      run: |
        sleep 3
        baseUrl="https://cdn.jsdelivr.net/gh/${{ github.repository }}@master"
        urls=""
        for f in `find snippets -name "*.yml" -type f`; do
          urls+="${baseUrl}/${f},"
        done
        for f in `find . -name "list*" -type f -maxdepth 1`; do
          urls+="${baseUrl}/${f},"
        done
        echo "urls=${urls%,*}" >> $GITHUB_OUTPUT
    - name: 清除 JsDelivr CDN 缓存
      uses: egad13/purge-jsdelivr-cache@v1.0.3
      with:
        url: ${{ steps.purge_urls.outputs.urls }}
