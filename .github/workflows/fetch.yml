name: Fetch

on:
  workflow_dispatch:
  schedule:
    # 表达式生成 https://crontab.guru/
    - cron: '30 0-15/2 * * *'
  push:
    paths:
      - 'sources.list'
      - 'config.yml'
      - '.github/workflows/**'
      - '**.py'
      - 'snippets/_*'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: 迁出代码
      uses: actions/checkout@v3
    - name: 安装 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: 设置时区
      run: sudo timedatectl set-timezone 'Asia/Shanghai'
    - name: 安装依赖
      run: pip install -r requirements.txt
    - name: 执行任务
      run: python ./fetch.py
      
    - name: 提交更改
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # 1. 先暂存 fetch.py 产生的新内容
        git add list.yml list_result.csv snippets/adblock.yml
        
        # 2. 暂存当前修改
        git stash push -m "AutoMerge new data"
        
        # 3. 拉取远程最新代码
        git pull --rebase origin master || {
          echo "Rebase failed, trying reset..."
          git rebase --abort || true
          git fetch origin
          git reset --hard origin/master
        }
        
        # 4. 恢复本地新内容（关键：强制覆盖）
        git stash pop || true
        
        # 5. 再次添加文件，解决冲突时保留我们的版本
        git add list.yml list_result.csv snippets/adblock.yml
        
        # 6. 检查是否有实际改动再提交
        if git diff --staged --quiet; then
          echo "No changes to commit"
          git stash drop || true
        else
          git commit -m "$(date '+%Y-%m-%d %H:%M:%S') 更新节点"
        fi
        
    - name: 推送更改
      uses: ad-m/github-push-action@master
      with:
        branch: master

    - name: 计算要清除缓存的文件
      id: purge_urls
      run: |
        sleep 3
        baseUrl="https://cdn.jsdelivr.net/gh/${{ github.repository }}@master"
        urls=""
        for f in `find snippets -name "*.yml" -type f`; do
          urls+="${baseUrl}/${f},"
        done
        for f in `find . -name "list*" -type f -maxdepth 1`; do
          urls+="${baseUrl}/${f},"
        done
        echo "urls=${urls%,*}" >> $GITHUB_OUTPUT
    - name: 清除 JsDelivr CDN 缓存
      uses: egad13/purge-jsdelivr-cache@v1.0.3
      with:
        url: ${{ steps.purge_urls.outputs.urls }}
